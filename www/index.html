<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#5c94fc" />
  <title>Super Jump World</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-item"><span class="hud-label">MUNDO</span><span id="hud-world">1-1</span></div>
      <div class="hud-item"><span class="hud-label">MOEDAS</span><span id="hud-coins">x00</span></div>
      <div class="hud-item"><span class="hud-label">PONTOS</span><span id="hud-score">000000</span></div>
      <div class="hud-item"><span class="hud-label">VIDAS</span><span id="hud-lives">x3</span></div>
      <div class="hud-item"><span class="hud-label">TEMPO</span><span id="hud-time">400</span></div>
    </div>

    <!-- Telas (menu, fim de fase, game over) -->
    <div id="overlay" class="overlay">
      <div class="panel">
        <h1 class="title">SUPER<br/>JUMP WORLD</h1>
        <p id="overlay-msg">Pule, esmague os monstros e chegue na bandeira!</p>
        <button id="start-btn" class="big-btn">JOGAR</button>
        <p class="hint">Teclado: ← → mover · Z/Espaço pular · X correr</p>
      </div>
    </div>

    <!-- Controles de toque -->
    <div id="touch-controls">
      <div class="dpad">
        <button class="ctrl-btn" id="btn-left" aria-label="esquerda">◀</button>
        <button class="ctrl-btn" id="btn-right" aria-label="direita">▶</button>
      </div>
      <div class="actions">
        <button class="ctrl-btn run" id="btn-run" aria-label="correr">B</button>
        <button class="ctrl-btn jump" id="btn-jump" aria-label="pular">A</button>
      </div>
    </div>

    <button id="pause-btn" aria-label="pausar">II</button>
  </div>

  <!-- Scripts carregados em ordem (sem módulos, compatível com WebView/file://) -->
  <script src="src/audio.js"></script>
  <script src="src/input.js"></script>
  <script src="src/sprites.js"></script>
  <script src="src/entities.js"></script>
  <script src="src/levels.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
